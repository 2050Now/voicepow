<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VoiceNote</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--surface:#13131a;--surface2:#1c1c26;
  --border:#ffffff12;--border2:#ffffff20;
  --text:#f0f0f8;--text-soft:#8888aa;--text-faint:#44445a;
  --accent:#7c6af7;--accent2:#5eead4;
  --red:#f87171;--green:#4ade80;
  --radius:16px;--radius-sm:10px;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;top:-200px;left:50%;transform:translateX(-50%);width:600px;height:600px;background:radial-gradient(circle,rgba(124,106,247,0.08) 0%,transparent 70%);pointer-events:none;z-index:0}

.header{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(10,10,15,0.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);z-index:100}
.logo{font-size:17px;font-weight:600;letter-spacing:-0.3px}
.logo-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--accent);margin-left:3px;vertical-align:middle;margin-bottom:2px}
.header-right{display:flex;align-items:center;gap:10px}
.rec-indicator{display:none;align-items:center;gap:6px;padding:4px 10px;border-radius:100px;background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.3);font-size:11px;font-weight:500;color:var(--red)}
.rec-indicator.active{display:flex}
.rec-dot{width:6px;height:6px;border-radius:50%;background:var(--red);animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.settings-btn{width:34px;height:34px;border-radius:50%;border:1px solid var(--border2);background:var(--surface);color:var(--text-soft);cursor:pointer;display:flex;align-items:center;justify-content:center}

.main{max-width:560px;margin:0 auto;padding:24px 16px 100px;display:flex;flex-direction:column;gap:16px;position:relative;z-index:1}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.card-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-soft)}

.api-body{padding:20px;display:flex;flex-direction:column;gap:14px}
.field-label{font-size:12px;font-weight:500;color:var(--text-soft);margin-bottom:6px}
.api-input{width:100%;padding:11px 14px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--surface2);color:var(--text);font-family:monospace;font-size:12px;outline:none;transition:border-color 0.15s}
.api-input:focus{border-color:var(--accent)}
.btn-primary{padding:11px;border-radius:var(--radius-sm);border:none;background:var(--accent);color:#fff;font-family:'Inter',sans-serif;font-size:14px;font-weight:500;cursor:pointer}
.hint{font-size:11px;color:var(--text-faint);line-height:1.5}
.key-status{font-size:12px;padding:8px 12px;border-radius:var(--radius-sm);background:var(--surface2);display:flex;gap:8px;align-items:center}
.key-ok{color:var(--green)}.key-missing{color:var(--red)}

.record-body{padding:32px 24px 24px;display:flex;flex-direction:column;align-items:center;gap:20px}
.orb-wrap{position:relative;width:120px;height:120px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.orb-ring{position:absolute;inset:-8px;border-radius:50%;border:1px solid transparent;transition:all 0.4s}
.orb-ring.active{border-color:rgba(248,113,113,0.3);animation:rpulse 2s ease-in-out infinite}
@keyframes rpulse{0%,100%{transform:scale(1);opacity:0.5}50%{transform:scale(1.08);opacity:1}}
.orb{width:120px;height:120px;border-radius:50%;background:linear-gradient(135deg,var(--surface2),var(--surface));border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;transition:all 0.3s;position:relative;overflow:hidden}
.orb::before{content:'';position:absolute;inset:0;border-radius:50%;background:radial-gradient(circle at 35% 35%,rgba(124,106,247,0.15),transparent 60%);opacity:0;transition:opacity 0.3s}
.orb-wrap:active .orb::before,.orb-wrap.recording .orb::before{opacity:1}
.orb-wrap.recording .orb{background:linear-gradient(135deg,rgba(248,113,113,0.15),var(--surface));border-color:rgba(248,113,113,0.3);box-shadow:0 0 40px rgba(248,113,113,0.15)}
.orb-wave{display:flex;align-items:center;gap:3px;opacity:0;transition:opacity 0.3s;position:absolute}
.orb-wrap.recording .orb-wave{opacity:1}
.orb-wrap.recording .orb-icon{opacity:0}
.orb-icon{transition:opacity 0.3s;position:absolute}
.obar{width:3px;border-radius:2px;background:var(--red);animation:owv 0.6s ease-in-out infinite}
@keyframes owv{0%,100%{height:6px;opacity:0.4}50%{height:24px;opacity:1}}
.obar:nth-child(1){animation-delay:0s}.obar:nth-child(2){animation-delay:.08s}.obar:nth-child(3){animation-delay:.16s}.obar:nth-child(4){animation-delay:.24s}.obar:nth-child(5){animation-delay:.16s}.obar:nth-child(6){animation-delay:.08s}.obar:nth-child(7){animation-delay:0s}
.rec-label{font-size:14px;font-weight:500;color:var(--text-soft)}
.rec-timer{font-size:13px;color:var(--red);font-weight:500;font-variant-numeric:tabular-nums;min-height:20px;letter-spacing:0.04em}

.upload-zone{margin:0 20px 20px;border:1px dashed var(--border2);border-radius:var(--radius-sm);padding:16px;text-align:center;cursor:pointer;transition:all 0.15s;color:var(--text-soft)}
.upload-zone:hover,.upload-zone:active{border-color:var(--accent);color:var(--accent);background:rgba(124,106,247,0.04)}
.upload-title{font-size:13px;font-weight:500}
.upload-sub{font-size:11px;color:var(--text-faint);margin-top:3px}

.status-row{margin:0 20px 14px;padding:10px 14px;border-radius:var(--radius-sm);background:var(--surface2);border:1px solid var(--border);display:none;align-items:center;gap:10px;font-size:13px;color:var(--text-soft)}
.status-row.visible{display:flex}
.s-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0;animation:blink 0.8s infinite}

.progress-wrap{margin:0 20px 14px;display:none}
.progress-wrap.visible{display:block}
.progress-track{height:3px;background:var(--surface2);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));width:0%;transition:width 0.5s;border-radius:2px}
.progress-text{font-size:11px;color:var(--text-faint);margin-top:6px;text-align:center}

.transcript-body{padding:20px;display:flex;flex-direction:column;gap:16px}
.bubble-row{display:flex;gap:12px;align-items:flex-start;animation:fadein 0.3s ease}
@keyframes fadein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.bubble-row.right{flex-direction:row-reverse}
.av{width:34px;height:34px;border-radius:50%;background:var(--surface2);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;margin-top:2px}
.bwrap{display:flex;flex-direction:column;gap:4px;max-width:78%}
.bubble-row.right .bwrap{align-items:flex-end}
.spk-label{font-size:11px;font-weight:600;letter-spacing:0.04em}
.bubble{padding:11px 15px;border-radius:14px;font-size:14px;line-height:1.65;white-space:pre-wrap;word-break:break-word;border:1px solid var(--border)}
.bubble-row:not(.right) .bubble{border-bottom-left-radius:4px}
.bubble-row.right .bubble{border-bottom-right-radius:4px}
.spk-0 .av{background:rgba(94,234,212,0.1);border-color:rgba(94,234,212,0.3)}.spk-0 .bubble{background:rgba(94,234,212,0.06);border-color:rgba(94,234,212,0.15)}.spk-0 .spk-label{color:#5eead4}
.spk-1 .av{background:rgba(248,113,113,0.1);border-color:rgba(248,113,113,0.3)}.spk-1 .bubble{background:rgba(248,113,113,0.06);border-color:rgba(248,113,113,0.15)}.spk-1 .spk-label{color:#f87171}
.spk-2 .av{background:rgba(124,106,247,0.1);border-color:rgba(124,106,247,0.3)}.spk-2 .bubble{background:rgba(124,106,247,0.06);border-color:rgba(124,106,247,0.15)}.spk-2 .spk-label{color:#a78bfa}
.spk-3 .av{background:rgba(251,191,36,0.1);border-color:rgba(251,191,36,0.3)}.spk-3 .bubble{background:rgba(251,191,36,0.06);border-color:rgba(251,191,36,0.15)}.spk-3 .spk-label{color:#fbbf24}
.spk-4 .av{background:rgba(74,222,128,0.1);border-color:rgba(74,222,128,0.3)}.spk-4 .bubble{background:rgba(74,222,128,0.06);border-color:rgba(74,222,128,0.15)}.spk-4 .spk-label{color:#4ade80}

.card-actions{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:8px}
.btn-ghost{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:transparent;color:var(--text-soft);font-family:'Inter',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all 0.15s}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn-ghost.danger:hover{border-color:var(--red);color:var(--red)}

.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--surface2);color:var(--text);border:1px solid var(--border2);padding:10px 20px;border-radius:100px;font-size:13px;font-weight:500;opacity:0;transition:all 0.2s;pointer-events:none;white-space:nowrap;z-index:999}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="header">
  <div class="logo">VoiceNote<span class="logo-dot"></span></div>
  <div class="header-right">
    <div class="rec-indicator" id="recIndicator"><span class="rec-dot"></span> REC</div>
    <button class="settings-btn" id="btnSettings">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </div>
</div>

<div class="main">

  <!-- API Keys -->
  <div class="card" id="apiCard" style="display:none">
    <div class="card-header"><span class="card-title">API Keys</span></div>
    <div class="api-body">
      <div>
        <div class="field-label">OpenAI API Key <span style="color:var(--text-faint)">(for transcription via Whisper)</span></div>
        <input type="password" class="api-input" id="openaiInput" placeholder="sk-..." autocomplete="off" spellcheck="false"/>
      </div>
      <div>
        <div class="field-label">Anthropic API Key <span style="color:var(--text-faint)">(for cleanup + speaker detection)</span></div>
        <input type="password" class="api-input" id="anthropicInput" placeholder="sk-ant-api03-..." autocomplete="off" spellcheck="false"/>
      </div>
      <button class="btn-primary" id="apiSave">Save keys</button>
      <div id="keyStatus" class="key-status"></div>
      <div class="hint">Keys stored only on this device · openai.com/api · console.anthropic.com</div>
    </div>
  </div>

  <!-- Record -->
  <div class="card">
    <div class="card-header">
      <span class="card-title">Record</span>
      <span id="recStatus" style="font-size:12px;color:var(--text-faint)">Ready</span>
    </div>
    <div class="record-body">
      <div class="orb-wrap" id="orbWrap">
        <div class="orb-ring" id="orbRing"></div>
        <div class="orb">
          <svg class="orb-icon" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="var(--text-soft)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
            <line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
          <div class="orb-wave">
            <div class="obar"></div><div class="obar"></div><div class="obar"></div>
            <div class="obar"></div><div class="obar"></div><div class="obar"></div>
            <div class="obar"></div>
          </div>
        </div>
      </div>
      <div class="rec-label" id="recLabel">Tap to record</div>
      <div class="rec-timer" id="recTimer"></div>
    </div>

    <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
      <div class="upload-title">Upload Voice Memo or audio file</div>
      <div class="upload-sub">m4a, mp3, wav, ogg · max 25MB</div>
      <input type="file" id="fileInput" accept="audio/*" style="display:none"/>
    </div>

    <div class="status-row" id="statusRow">
      <span class="s-dot"></span>
      <span id="statusText"></span>
    </div>
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-text" id="progressText"></div>
    </div>
  </div>

  <!-- Transcript -->
  <div class="card" id="transcriptCard" style="display:none">
    <div class="card-header">
      <span class="card-title">Transcript</span>
      <span id="speakerBadge" style="font-size:12px;color:var(--text-faint)"></span>
    </div>
    <div class="transcript-body" id="transcriptBody"></div>
    <div class="card-actions">
      <button class="btn-ghost" id="btnCopy">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Copy all
      </button>
      <button class="btn-ghost danger" id="btnClear">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
        Clear
      </button>
    </div>
  </div>

</div>
<div class="toast" id="toast"></div>

<script>
var openaiKey = localStorage.getItem('vn_openai') || '';
var anthropicKey = localStorage.getItem('vn_anthropic') || '';
var recording = false;
var stream = null;
var mediaRecorder = null;
var chunks = [];
var timerInt = null;
var seconds = 0;

var $ = function(id){ return document.getElementById(id); };
var btnSettings = $('btnSettings'), apiCard = $('apiCard');
var openaiInput = $('openaiInput'), anthropicInput = $('anthropicInput');
var apiSave = $('apiSave'), keyStatus = $('keyStatus');
var orbWrap = $('orbWrap'), orbRing = $('orbRing');
var recLabel = $('recLabel'), recTimer = $('recTimer'), recStatus = $('recStatus');
var recIndicator = $('recIndicator');
var statusRow = $('statusRow'), statusText = $('statusText');
var progressWrap = $('progressWrap'), progressFill = $('progressFill'), progressText = $('progressText');
var transcriptCard = $('transcriptCard'), transcriptBody = $('transcriptBody'), speakerBadge = $('speakerBadge');
var fileInput = $('fileInput');
var btnCopy = $('btnCopy'), btnClear = $('btnClear');
var toastEl = $('toast');

// Init
if(openaiKey) openaiInput.value = openaiKey;
if(anthropicKey) anthropicInput.value = anthropicKey;
updateKeyStatus();

function updateKeyStatus(){
  var ok1 = openaiKey.startsWith('sk-');
  var ok2 = anthropicKey.startsWith('sk-ant-');
  keyStatus.innerHTML =
    '<span class="'+(ok1?'key-ok':'key-missing')+'">'+(ok1?'✓':'✗')+' OpenAI</span> &nbsp; ' +
    '<span class="'+(ok2?'key-ok':'key-missing')+'">'+(ok2?'✓':'✗')+' Anthropic</span>';
}

function toast(msg){ toastEl.textContent=msg; toastEl.classList.add('show'); setTimeout(function(){toastEl.classList.remove('show')},2500); }
function setStatus(msg, show){ statusRow.classList.toggle('visible',!!show); statusText.textContent=msg||''; }
function setProgress(pct, label){
  progressWrap.classList.toggle('visible', pct!==null);
  if(pct!==null){ progressFill.style.width=pct+'%'; progressText.textContent=label||''; }
}
function fmt(s){ var m=Math.floor(s/60),ss=s%60; return (m<10?'0':'')+m+':'+(ss<10?'0':'')+ss; }

// Settings
btnSettings.addEventListener('click', function(){
  var v = apiCard.style.display !== 'none';
  apiCard.style.display = v ? 'none' : 'block';
  if(!v) openaiInput.focus();
});

apiSave.addEventListener('click', function(){
  var ok = openaiInput.value.trim();
  var ak = anthropicInput.value.trim();
  if(ok) { openaiKey = ok; localStorage.setItem('vn_openai', ok); }
  if(ak) { anthropicKey = ak; localStorage.setItem('vn_anthropic', ak); }
  updateKeyStatus();
  apiCard.style.display = 'none';
  toast('Keys saved ✓');
});

// Recording
orbWrap.addEventListener('click', function(){
  if(recording){ stopRec(); } else { startRec(); }
});

function startRec(){
  if(!openaiKey){ toast('Add OpenAI key first →'); apiCard.style.display='block'; return; }
  navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true,autoGainControl:true}})
  .then(function(s){
    stream = s; chunks = []; seconds = 0; recording = true;

    // iOS supports audio/mp4, desktop supports audio/webm
    var mime = MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus'
             : MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm'
             : MediaRecorder.isTypeSupported('audio/mp4') ? 'audio/mp4'
             : 'audio/ogg';

    mediaRecorder = new MediaRecorder(stream, {mimeType: mime});
    mediaRecorder.ondataavailable = function(e){ if(e.data.size>0) chunks.push(e.data); };
    mediaRecorder.onstop = function(){
      var blob = new Blob(chunks, {type: mime});
      transcribeWithWhisper(blob, mime);
    };
    mediaRecorder.start(1000);

    // UI
    orbWrap.classList.add('recording');
    orbRing.classList.add('active');
    recLabel.textContent = 'Tap to stop';
    recStatus.textContent = 'Recording';
    recIndicator.classList.add('active');
    timerInt = setInterval(function(){ seconds++; recTimer.textContent = fmt(seconds); }, 1000);
  })
  .catch(function(){ toast('Microphone access denied'); });
}

function stopRec(){
  recording = false;
  clearInterval(timerInt);
  if(mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
  if(stream){ stream.getTracks().forEach(function(t){t.stop();}); stream = null; }
  orbWrap.classList.remove('recording');
  orbRing.classList.remove('active');
  recLabel.textContent = 'Tap to record';
  recTimer.textContent = '';
  recStatus.textContent = 'Ready';
  recIndicator.classList.remove('active');
}

// File upload
fileInput.addEventListener('change', function(){
  if(!fileInput.files || !fileInput.files[0]) return;
  var file = fileInput.files[0];
  if(!openaiKey){ toast('Add OpenAI key first →'); apiCard.style.display='block'; return; }
  transcribeWithWhisper(file, file.type);
});

// Step 1: Whisper transcription
function transcribeWithWhisper(blob, mime){
  setStatus('Transcribing with Whisper…', true);
  setProgress(15, 'Sending audio to Whisper…');
  transcriptCard.style.display = 'none';

  // Build FormData for Whisper API
  var ext = mime.indexOf('mp4')>-1||mime.indexOf('m4a')>-1 ? 'mp4'
          : mime.indexOf('webm')>-1 ? 'webm'
          : mime.indexOf('ogg')>-1 ? 'ogg'
          : mime.indexOf('wav')>-1 ? 'wav'
          : mime.indexOf('mp3')>-1||mime.indexOf('mpeg')>-1 ? 'mp3'
          : 'mp4';

  var formData = new FormData();
  formData.append('file', blob, 'audio.' + ext);
  formData.append('model', 'whisper-1');
  formData.append('response_format', 'text');
  // Language auto-detect — supports German, English, French etc.

  fetch('https://api.openai.com/v1/audio/transcriptions', {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + openaiKey },
    body: formData
  })
  .then(function(r){
    if(!r.ok) return r.json().then(function(e){ throw new Error(e.error && e.error.message || 'Whisper error'); });
    return r.text();
  })
  .then(function(transcript){
    setProgress(60, 'Cleaning up with Claude…');
    if(!transcript || !transcript.trim()){ toast('No speech detected'); setStatus('',false); setProgress(null); return; }
    if(anthropicKey){
      cleanWithClaude(transcript.trim());
    } else {
      // No Anthropic key — show raw Whisper transcript as single speaker
      setProgress(100, 'Done!');
      setTimeout(function(){ setProgress(null); setStatus('',false); }, 800);
      renderTranscript([{speaker:'Speaker 1', emoji:'👤', text:transcript.trim()}]);
      speakerBadge.textContent = '1 speaker';
    }
  })
  .catch(function(err){
    setProgress(null); setStatus('',false);
    toast('Whisper error: ' + err.message);
  });
}

// Step 2: Claude cleanup + speaker diarization
function cleanWithClaude(rawTranscript){
  var prompt = 'You are a professional meeting transcription assistant.\n\nHere is a raw transcript from Whisper speech recognition:\n\n"' + rawTranscript + '"\n\nPlease:\n1. Identify different speakers (Speaker 1, Speaker 2, etc.) based on context, question/answer patterns, perspective shifts, and conversational flow\n2. Remove all filler words: um, uh, ähm, like, basically, you know, halt, also, sort of, I mean\n3. Fix grammar, punctuation, capitalization\n4. Format any lists or enumerations as bullet points with •\n5. Add proper comma after salutations (Hi Michael,) followed by a new paragraph\n6. Keep the original meaning exactly — do not add or invent content\n\nReturn ONLY a valid JSON array, no other text:\n[{"speaker":"Speaker 1","text":"their cleaned words"},{"speaker":"Speaker 2","text":"their response"}]\n\nIf only one speaker is detectable, return single-item array. Keep speaker labels consistent.';

  fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': anthropicKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 3000,
      messages: [{role:'user', content:prompt}]
    })
  })
  .then(function(r){ setProgress(90,'Almost done…'); return r.json(); })
  .then(function(data){
    setProgress(100,'Done!');
    setTimeout(function(){ setProgress(null); setStatus('',false); }, 800);
    if(data.error){ toast('Claude error: '+data.error.message); return; }
    var raw = data.content && data.content[0] && data.content[0].text;
    if(!raw) throw new Error('Empty response');
    var m = raw.match(/\[[\s\S]*\]/);
    var parsed = JSON.parse(m ? m[0] : raw.replace(/```json|```/g,'').trim());
    var emojis = ['👤','👥','🎙','💼','🧑'];
    parsed.forEach(function(p,i){ p.emoji = emojis[i%emojis.length]; });
    renderTranscript(parsed);
    var u = [...new Set(parsed.map(function(p){return p.speaker}))].length;
    speakerBadge.textContent = u + ' speaker' + (u>1?'s':'');
  })
  .catch(function(err){
    setProgress(null); setStatus('',false);
    toast('Error: ' + err.message);
  });
}

var spkMap = {}, spkIdx = 0;
function getSpkIdx(s){ if(spkMap[s]===undefined) spkMap[s]=spkIdx++; return spkMap[s]; }

function renderTranscript(items){
  spkMap = {}; spkIdx = 0;
  transcriptCard.style.display = 'block';
  transcriptBody.innerHTML = '';
  items.forEach(function(item){
    var idx = getSpkIdx(item.speaker), right = idx%2===1;
    var row = document.createElement('div');
    row.className = 'bubble-row spk-'+(idx%5)+(right?' right':'');
    var av = document.createElement('div'); av.className='av'; av.textContent=item.emoji;
    var bw = document.createElement('div'); bw.className='bwrap';
    var lbl = document.createElement('div'); lbl.className='spk-label'; lbl.textContent=item.speaker;
    var bub = document.createElement('div'); bub.className='bubble'; bub.textContent=item.text;
    bw.appendChild(lbl); bw.appendChild(bub);
    if(right){ row.appendChild(bw); row.appendChild(av); }
    else{ row.appendChild(av); row.appendChild(bw); }
    transcriptBody.appendChild(row);
  });
}

btnCopy.addEventListener('click', function(){
  var rows = transcriptBody.querySelectorAll('.bubble-row');
  if(!rows.length){ toast('Nothing to copy'); return; }
  var lines = [];
  rows.forEach(function(r){
    var l=r.querySelector('.spk-label'), b=r.querySelector('.bubble');
    if(l&&b) lines.push(l.textContent+':\n'+b.textContent);
  });
  navigator.clipboard.writeText(lines.join('\n\n')).then(function(){ toast('Copied ✓'); });
});

btnClear.addEventListener('click', function(){
  transcriptCard.style.display='none';
  setStatus('',false);
  toast('Cleared');
});
</script>
